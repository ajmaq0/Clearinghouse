version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clearflow
      POSTGRES_PASSWORD: clearflow
      POSTGRES_DB: clearflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./backend
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://clearflow:clearflow@db:5432/clearflow
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://clearflow:clearflow@db:5432/clearflow
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  seed:
    build:
      context: ./backend
    command: python seeds/seed.py
    environment:
      DATABASE_URL: postgresql://clearflow:clearflow@db:5432/clearflow
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
