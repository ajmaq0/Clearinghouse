version: "3.9"

# Local testing on http://localhost:3100
# Usage:
#   docker compose -f docker-compose.local.yml up --build
#
# The frontend (nginx) is served on port 3100.
# It proxies /api/* requests to the api container on the internal network.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clearflow
      POSTGRES_PASSWORD: clearflow
      POSTGRES_DB: clearflow
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./backend
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://clearflow:clearflow@db:5432/clearflow
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: ./backend
    command: python seeds/seed.py
    environment:
      DATABASE_URL: postgresql://clearflow:clearflow@db:5432/clearflow
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://clearflow:clearflow@db:5432/clearflow
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3100:80"
    depends_on:
      - api

volumes:
  pgdata_local:
